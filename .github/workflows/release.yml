name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Build Windows executables
        run: |
          pyinstaller build/pyinstaller/windows-claude.spec -y
          pyinstaller build/pyinstaller/windows-openclaw.spec -y
      - uses: actions/upload-artifact@v4
        with:
          name: windows-gui
          path: dist/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Build macOS apps
        run: |
          pyinstaller build/pyinstaller/macos-claude.spec -y
          pyinstaller build/pyinstaller/macos-openclaw.spec -y
          cd dist && for app in *.app; do zip -r "${app%.app}.zip" "$app"; done
      - uses: actions/upload-artifact@v4
        with:
          name: macos-gui
          path: dist/*.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release-files/gui release-files/scripts
          cp artifacts/windows-gui/* release-files/gui/ 2>/dev/null || true
          cp artifacts/macos-gui/* release-files/gui/ 2>/dev/null || true
          cp -r scripts/* release-files/scripts/
          cd release-files && find . -type f | sort | xargs sha256sum > CHECKSUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/gui/*
            release-files/scripts/**/*
            release-files/CHECKSUMS.txt
          generate_release_notes: true
          body: |
            ## Downloads

            | Platform | Claude Code | OpenClaw |
            |----------|-------------|----------|
            | **Windows GUI** | `AIReady-ClaudeCode-Win.exe` | `AIReady-OpenClaw-Win.exe` |
            | **macOS GUI** | `AIReady-ClaudeCode-Mac.zip` | `AIReady-OpenClaw-Mac.zip` |
            | **Windows Script** | `AIReady-ClaudeCode.bat` | `AIReady-OpenClaw.bat` |
            | **macOS/Linux Script** | `AIReady-ClaudeCode.sh` | `AIReady-OpenClaw.sh` |

            ## macOS: "Cannot verify app" fix

            macOS Gatekeeper blocks unsigned apps. To run the GUI version:

            **Option A (Recommended):**
            1. Download and unzip the `.zip` file
            2. Open Terminal and run:
               ```
               xattr -cr ~/Downloads/AIReady-ClaudeCode-Mac.app
               ```
            3. Double-click the `.app` to open

            **Option B:**
            1. Right-click the `.app` → "Open"
            2. Click "Open" on the security warning
            3. If that doesn't work: System Settings → Privacy & Security → "Open Anyway"

            **Option C:** Use the `.sh` script version instead (no Gatekeeper issue):
            ```
            curl -fsSL https://github.com/BerryGreatTi/ai-ready/releases/latest/download/AIReady-ClaudeCode.sh | bash
            ```
